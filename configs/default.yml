# Default configuration for paleoeurope fusion pipeline
# All parameters are documented with units and valid ranges.

# --- Fusion parameters ---
fusion:
  # Width (in pixels at 3 arc-second resolution) of the land/sea blending zone.
  # Larger value = smoother transition, but more FABDEM data overwritten near coast.
  # At 3 arc-sec (~90 m at equator), 50 px ≈ 4.5 km blend zone.
  blend_distance_px: 50

  # Tile size for processing (degrees). Must match FABDEM tile naming convention.
  tile_size_deg: 1.0

  # FABDEM nodata value
  fabdem_nodata: -9999.0

  # GEBCO nodata value
  gebco_nodata: -32767

  # EGM2008 geoid grid path (relative to project root, or absolute).
  # Download from: https://earth-info.nga.mil/index.php?dir=wgs84
  egm2008_grid: "data/raw/egm2008/egm2008_25.tif"

  # Apply EGM2008-based geoid/undulation offset to GEBCO.
  # IMPORTANT: this is validation-dependent; default is OFF.
  apply_geoid_offset: false

  # Output format
  output_format: "GTiff"
  output_dtype: "float32"
  output_compress: "LZW"
  output_nodata: -9999.0

# --- GIA parameters ---
gia:
  # Available epochs (ka = thousand years before present)
  epochs: [0, 8, 12, 21]

  # ICE-6G_C NetCDF path
  ice6g_path: "data/raw/ice6g/ICE-6G_C_VM5a_O512.nc"

  # ICE-7G_NA NetCDF path
  ice7g_path: "data/raw/ice7g/ICE-7G_NA_VM7_O512.nc"

  # Which ice model to use for the delta correction.
  # Options: "ice6g", "ice7g", "average"
  default_model: "ice6g"

  # Buffer around tiles for GIA interpolation (degrees)
  gia_interp_buffer_deg: 0.5

# --- Paths ---
paths:
  fabdem_dir: "data/raw/fabdem/"
  gebco_file: "data/raw/gebco/GEBCO_2024.nc"
  output_dir: "data/output/"
  processed_dir: "data/processed/"
  paleo_dem_dir: "data/processed/paleo_dem/"

# --- Logging ---
logging:
  level: "INFO"
  format: "%(asctime)s %(levelname)s %(name)s: %(message)s"
