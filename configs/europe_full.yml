# Production configuration for full-Europe run
# Inherits and overrides configs/default.yml

# --- Fusion parameters ---
fusion:
  blend_distance_px: 50
  tile_size_deg: 1.0
  fabdem_nodata: -9999.0
  gebco_nodata: -32767
  egm2008_grid: "data/raw/egm2008/egm2008_25.tif"
  apply_geoid_offset: false
  output_format: "GTiff"
  output_dtype: "float32"
  output_compress: "LZW"
  output_nodata: -9999.0

# --- GIA parameters ---
gia:
  epochs: [0, 8, 12, 21]
  ice6g_path: "data/raw/ice6g/ICE-6G_C_VM5a_O512.nc"
  ice7g_path: "data/raw/ice7g/ICE-7G_NA_VM7_O512.nc"
  default_model: "ice6g"
  gia_interp_buffer_deg: 0.5

# --- Domain: full Europe bounding box ---
domain:
  lon_min: -32.0   # Iceland west coast
  lon_max:  42.0   # Ural / Black Sea east
  lat_min:  34.0   # North Africa / Gibraltar
  lat_max:  72.0   # Svalbard / Nordkapp

# --- Tile list ---
# Generated by: scripts/run_full_pipeline.py --generate-tile-list
tile_list: "configs/europe_tiles.txt"

# --- Distributed (Celery) ---
distributed:
  broker_url: "redis://redis:6379/0"
  result_backend: "redis://redis:6379/1"
  worker_concurrency: 4
  task_soft_time_limit: 600   # seconds per tile
  task_time_limit: 900

# --- Paths ---
paths:
  fabdem_dir: "data/raw/fabdem/"
  gebco_file: "data/raw/gebco/GEBCO_2024.nc"
  output_dir: "data/output/europe/"
  processed_dir: "data/processed/"
  paleo_dem_dir: "data/processed/paleo_dem/"

# --- Logging ---
logging:
  level: "INFO"
  format: "%(asctime)s %(levelname)s %(name)s: %(message)s"
