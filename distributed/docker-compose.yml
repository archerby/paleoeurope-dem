version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: distributed/Dockerfile
    command: celery -A distributed.tasks worker --loglevel=info --concurrency=4
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ../data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  flower:
    build:
      context: ..
      dockerfile: distributed/Dockerfile
    command: celery -A distributed.tasks flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
